name: ai_architect
description: AI-powered architectural design app — 2D floor plans and 3D renders from natural language.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1

  # Image
  image_picker: ^1.1.1
  cached_network_image: ^3.3.1

  # 3D viewer
  model_viewer_plus: ^1.7.2

  # Share / download
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # Colour picker
  flutter_colorpicker: ^1.1.0

  # Animations
  lottie: ^3.1.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
